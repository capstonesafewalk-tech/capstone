<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeWalk Admin - Crime Map View</title>
  <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.0.0/dist/maplibre-gl.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.0.0/dist/maplibre-gl.min.css" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f3f4f6;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    h1 {
      font-size: 1.875rem;
      font-weight: 700;
      margin-bottom: 2rem;
      color: #1f2937;
    }
    
    .map-wrapper {
      background: white;
      border-radius: 0.5rem;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
      overflow: hidden;
      height: 600px;
    }
    
    #map {
      width: 100%;
      height: 100%;
    }
    
    .legend {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: white;
      padding: 1rem;
      border-radius: 0.5rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      z-index: 1000;
      font-size: 0.875rem;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    
    .legend-item:last-child {
      margin-bottom: 0;
    }
    
    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      margin-right: 0.5rem;
      border: 2px solid;
    }
    
    .safe-zone {
      background-color: #A5D6A7;
      border-color: #4CAF50;
    }
    
    .risk-zone {
      background-color: #EF5350;
      border-color: #D32F2F;
    }
    
    .info-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      background: white;
      padding: 1rem;
      border-radius: 0.5rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      z-index: 1000;
      max-width: 300px;
    }
    
    .info-panel h3 {
      margin-bottom: 0.5rem;
      color: #1f2937;
      font-size: 1rem;
    }
    
    .info-panel p {
      color: #6b7280;
      font-size: 0.875rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Crime Map View</h1>
    
    <div class="map-wrapper" style="position: relative;">
      <div id="map"></div>
      
      <div class="info-panel">
        <h3>🗺️ Map Status</h3>
        <p id="status">Loading map...</p>
      </div>
      
      <div class="legend">
        <div class="legend-item">
          <div class="legend-color safe-zone"></div>
          <span>Safe Zones</span>
        </div>
        <div class="legend-item">
          <div class="legend-color risk-zone"></div>
          <span>Risk Zones</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    function initMap() {
      const map = new maplibregl.Map({
        container: 'map',
        style: 'https://demotiles.maplibre.org/style.json',
        center: [122.9456, 10.6676],
        zoom: 13,
        pitch: 0,
        bearing: 0
      });

      map.on('load', function() {
        document.getElementById('status').innerHTML = '✅ Map loaded successfully<br/>MapLibre GL JS v4.0.0';

        // Safe zones (green)
        map.addSource('safe-zones', {
          type: 'geojson',
          data: {
            type: 'FeatureCollection',
            features: [
              {
                type: 'Feature',
                geometry: { type: 'Point', coordinates: [122.9430, 10.6690] },
                properties: { name: 'Central Park Safe Zone', radius: 180 }
              },
              {
                type: 'Feature',
                geometry: { type: 'Point', coordinates: [122.9490, 10.6640] },
                properties: { name: 'Police Station - Bacolod', radius: 120 }
              }
            ]
          }
        });

        map.addLayer({
          id: 'safe-zones-circle',
          type: 'circle',
          source: 'safe-zones',
          paint: {
            'circle-radius': [
              'interpolate',
              ['linear'],
              ['zoom'],
              10, 8,
              13, 15,
              16, 30
            ],
            'circle-color': '#A5D6A7',
            'circle-opacity': 0.25,
            'circle-stroke-color': '#4CAF50',
            'circle-stroke-width': 3
          }
        });

        // Risk zones (red)
        map.addSource('risk-zones', {
          type: 'geojson',
          data: {
            type: 'FeatureCollection',
            features: [
              {
                type: 'Feature',
                geometry: { type: 'Point', coordinates: [122.9440, 10.6700] },
                properties: { name: 'High Crime Area - Downtown', radius: 200 }
              },
              {
                type: 'Feature',
                geometry: { type: 'Point', coordinates: [122.9500, 10.6650] },
                properties: { name: 'Caution Zone - Near Market', radius: 150 }
              }
            ]
          }
        });

        map.addLayer({
          id: 'risk-zones-circle',
          type: 'circle',
          source: 'risk-zones',
          paint: {
            'circle-radius': [
              'interpolate',
              ['linear'],
              ['zoom'],
              10, 8,
              13, 15,
              16, 30
            ],
            'circle-color': '#EF5350',
            'circle-opacity': 0.22,
            'circle-stroke-color': '#D32F2F',
            'circle-stroke-width': 3
          }
        });

        console.log('✅ MapLibre GL JS migration complete!');
        console.log('✅ Safe zones rendered');
        console.log('✅ Risk zones rendered');
      });

      map.on('error', function(e) {
        console.error('Map error:', e);
        document.getElementById('status').innerHTML = '❌ Error loading map';
      });
    }

    // Initialize map when page loads
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initMap);
    } else {
      initMap();
    }
  </script>
</body>
</html>
